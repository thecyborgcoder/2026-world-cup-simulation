<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Bracket</title>
    <meta name="description" content="Interactive 2026 World Cup Knockout Stage Bracket with modern design">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="controls">
            <div class="toggle-group">
                <button id="toggle-table" class="control-btn toggle-btn active">Table</button>
                <button id="toggle-bracket" class="control-btn toggle-btn active">Bracket</button>
            </div>
            <button id="clear-btn" class="control-btn clear-btn">Clear</button>
            <div class="sim-input-group">
                <label for="sim-count">Simulations:</label>
                <input type="number" id="sim-count" value="1000" min="1" max="100000">
            </div>
            <button id="run-btn" class="control-btn run-btn">Run Simulations</button>
        </div>
        <div id="progress-wrapper" class="progress-wrapper" style="display: none;">
            <div class="progress-info">
                <span id="progress-status">Simulating...</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
        <h1>2026 World Cup Simulator</h1>
        <p>Knockout Stage Bracket</p>
    </div>

    <div class="stats-wrapper">
        <h2 class="stats-heading">Tournament Simulation Probabilities</h2>
        <div class="table-container">
            <div id="column-controls" class="column-controls">
                <span class="column-controls-label">Columns:</span>
                <button class="col-toggle active" data-col="rank">Rank</button>
                <button class="col-toggle active" data-col="team">Team</button>
                <button class="col-toggle active" data-col="R32_%">R32 %</button>
                <button class="col-toggle active" data-col="R16_%">R16 %</button>
                <button class="col-toggle active" data-col="QF_%">QF %</button>
                <button class="col-toggle active" data-col="SF_%">SF %</button>
                <button class="col-toggle active" data-col="Final_%">Final %</button>
                <button class="col-toggle active" data-col="Win_%">Win %</button>
            </div>
            <table id="stats-table" class="stats-table">
                <thead>
                    <tr>
                        <th class="rank-col sortable" data-sort="rank">Rank <span class="sort-icon"></span></th>
                        <th class="team-col sortable" data-sort="team">Team <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="R32_%">R32 % <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="R16_%">R16 % <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="QF_%">QF % <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="SF_%">SF % <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="Final_%">Final % <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="Win_%">Win % <span class="sort-icon"></span></th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
            <button id="expand-stats-btn" class="expand-btn">Show All Teams</button>
        </div>
    </div>

    <div class="bracket-wrapper">
        <div id="bracket-container" class="bracket-container">
            <!-- Left side -->
            <div id="left-half" class="half left-half"></div>
            <!-- Final -->
            <div id="center-final" class="center-final"></div>
            <!-- Right side -->
            <div id="right-half" class="half right-half"></div>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
